version: '3.8'
services:
  # 1. MongoDB Service (Database Container)
  bookverse-db:
    image: mongo:6.0
    container_name: bookverse-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      # Persistent Volume for Database Data
      - bookverse-data:/data/db
      # JSON files for initial import
      - /home/ubuntu/WebTechSemProject/database:/tmp/db_files:ro
    networks:
      - bookverse-network

  # 2. Backend Service (Node.js/Express API)
  bookverse-backend:
    image: spookie571/bookverse-backend:latest
    container_name: bookverse-api
    restart: always
    environment:
      MONGODB_URI: mongodb://bookverse-db:27017/bookverse
      JWT_SECRET: your_secret_key_here
      PORT: 5000
    ports:
      - "5001:5000"
    networks:
      - bookverse-network
    depends_on:
      - bookverse-db

  # 3. Frontend Service (React/Nginx)
  bookverse-frontend:
    image: spookie571/bookverse-frontend:latest
    container_name: bookverse-web
    restart: always
    ports:
      - "80:80"
    networks:
      - bookverse-network
    depends_on:
      - bookverse-backend

# Define persistent volume
volumes:
  bookverse-data:

# Define internal bridge network
networks:
  bookverse-network:
    driver: bridge
