services:
  bookverse-db:
    image: mongo:6.0
    container_name: bookverse-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - bookverse-data:/data/db
      - /home/ubuntu/WebTechSemProject/database:/tmp/db_files:ro
    networks:
      - bookverse-network

  bookverse-backend:
    image: spookie571/bookverse-backend:latest
    container_name: bookverse-api
    restart: always
    environment:
      MONGODB_URI: mongodb://bookverse-db:27017/bookverse
      JWT_SECRET: your_secret_key_here
      PORT: 5000
    ports:
      - "5000:5000"
    networks:
      - bookverse-network
    depends_on:
      - bookverse-db

  bookverse-frontend:
    image: spookie571/bookverse-frontend:latest
    container_name: bookverse-web
    restart: always
    ports:
      - "80:80"
    networks:
      - bookverse-network
    depends_on:
      - bookverse-backend

volumes:
  bookverse-data:

networks:
  bookverse-network:
    driver: bridge
